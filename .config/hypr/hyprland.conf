#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

autogenerated = 0 # remove this line to remove the warning

# define variables
#$TERM = env WINIT_UNIX_BACKEND=x11 alacritty
$TERM = foot

# environment variables
env = GTK_THEME, Yaru-blue-dark

# for input method
#$IM = ibus
#exec-once = /usr/bin/ibus-daemon
$IM = fcitx
exec-once = fcitx5

env = QT_IM_MODULE, $IM
env = XMODIFIERS, @im=$IM
env = QT4_IM_MODULE, $IM
env = CLUTTER_IM_MODULE, $IM
env = GLFW_IM_MODULE, $IM

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = , preferred, auto, 1

# Execute your favorite apps at launch

exec-once = $TERM
#exec-once = dunst
#exec-once = waybar
exec-once = hyprpaper
exec-once = eww open bar
exec-once = ~/.config/hypr/xdph.sh

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
	kb_layout = us, jp
	kb_variant =
	kb_model =
	kb_options =
	kb_rules =

	numlock_by_default = true

	follow_mouse = 1
	scroll_method = no_scroll

	touchpad {
		tap-to-click = false
		middle_button_emulation = false
	}

	sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
	# See https://wiki.hyprland.org/Configuring/Variables/ for more

	gaps_in = 2
	gaps_out = 5
	border_size = 2
	#col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
	#col.inactive_border = rgba(595959aa)
	col.active_border = rgba(669df6ff)
	col.inactive_border = rgba(737994ff)

	layout = dwindle
}

decoration {
	# See https://wiki.hyprland.org/Configuring/Variables/ for more

	rounding = 5

	blur {
		enabled = false
		new_optimizations = true
	}

	drop_shadow = false
	shadow_range = 5
	shadow_render_power = 0
	col.shadow = rgba(1a1a1aee)
}

animations {
	enabled = true

	# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

	bezier = bezier1, 0.1, 0.9, 0.1, 1.0
	bezier = bezier2, 0.2, 0.7, 0.2, 1.0

	animation = fade, 1, 5, default
	animation = border, 1, 7, default
	animation = windows, 1, 4, default, slide
	animation = windowsOut, 1, 4, default, slide
	animation = workspaces, 1, 5, bezier1, slidevert
}

dwindle {
	# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
	pseudotile = true     # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
	preserve_split = true # you probably want this
}

master {
	# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
	new_is_master = true
}

gestures {
	# See https://wiki.hyprland.org/Configuring/Variables/ for more
	workspace_swipe = false
}

misc {
	disable_hyprland_logo = true
	disable_splash_rendering = true
	disable_autoreload = true
}

debug {
	disable_logs = true
}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $TERM
bind = $mainMod SHIFT, Q, killactive,
#bind = $mainMod, M, exit,
#bind = $mainMod, E, exec, nemo
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = , XF86TouchpadToggle, exec, ~/.config/i3/src/toggletouchpad.sh

# Pulse Audio controls
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Sreen brightness controls
bind = , XF86MonBrightnessUp, exec, light -A 10
bind = , XF86MonBrightnessDown, exec, light -U 10

# Move focus with mainMod + arrow keys
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1

bind = $mainMod, Q, workspace, e-1
bind = $mainMod, E, workspace, e+1
bind = $mainMod, W, togglegroup

bind = , Print, exec, grim -c - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)"

bind = , XF86PowerDown, exec, systemctl suspend

# Move/resize windows with mainMod + LMB/RMB: and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

windowrule = rounding 15, eww_power_dialog

windowrulev2 = rounding 0, class:^$, title:^$
windowrulev2 = animation popin, floating: 1
windowrule = noborder, Xdg-desktop-portal-gtk


windowrulev2 = tile, class:^(Alacritty)$
windowrulev2 = workspace 1, class:^(Alacritty)$
windowrule = workspace 1, foot
windowrule = workspace 1, Gnome-terminal


windowrule = workspace 2, Brave-browser
windowrule = workspace 2, Chromium
windowrule = workspace 2, firefox
windowrule = workspace 2, Google-chrome


windowrulev2 = workspace 3, class:^(jetbrains-idea-ce)$, title:^((?!splash).)*$
windowrulev2 = workspace 3 silent, class:^(jetbrains-idea-ce)$, title:^(splash)$
windowrulev2 = rounding 0, class:^(jetbrains-idea-ce)$, title:^(win[0-9]*)$

windowrulev2 = workspace 3, class:^(code-oss)$
windowrulev2 = workspace 3, class:^(codeblocks)$
windowrulev2 = float, class:^(codeblocks-console)$
windowrulev2 = workspace 3, class:^(codeblocks-console)$

windowrule = workspace 3, Eclipse
windowrulev2 = float, class:^(java)$, title:^(Eclipse)$
windowrulev2 = workspace 3 silent, class:^(java)$, title:^(Eclipse)$

windowrule = workspace 3, Emacs
windowrule = workspace 3, Mysql-workbench-bin
windowrule = workspace 3, Nvim
windowrule = workspace 3, nvim-qt


windowrule = workspace 4, nemo
windowrule = workspace 4, Nautilus
windowrule = workspace 4, qBittorrent


windowrule = workspace 5, Gnome-screenshot
windowrule = workspace 5, obs
windowrule = workspace 5, vlc


windowrule = tile, deadcells
windowrule = workspace 6, deadcells
windowrulev2 = tile, title:^(Minecraft.*)$, class:^(Minecraft.*)$
windowrulev2 = workspace 6, title:^(Minecraft.*)$, class:^(Minecraft.*)$
windowrule = workspace 6, org-tlauncher-tlauncher-rmo-TLauncher


windowrule = workspace 7, discord
windowrule = workspace silent 7, Microsoft Teams - Preview
windowrulev2 = workspace silent 7, class:^(zoom)$
