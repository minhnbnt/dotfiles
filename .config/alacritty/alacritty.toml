[colors.bright]
black = "#51576d"
blue = "#1e66f5"
cyan = "#179299"
green = "#40a02b"
magenta = "#ea76cb"
red = "#d20f39"
white = "#ffffff"
yellow = "#df8e1d"

[colors.normal]
black = "#000000"
blue = "#1547ac"
cyan = "#10666b"
green = "#2d701e"
magenta = "#a4538e"
red = "#930b28"
white = "#acb0be"
yellow = "#9c6314"

[colors.primary]
background = "#06060a"
foreground = "#cdd6f4"

[cursor.style]
blinking = "Off"
shape = "block"

[font]
size = 10.5

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Fira Mono"
style = "Bold Italic"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "Fira Mono"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[[keyboard.bindings]]
action = "Paste"
key = "Paste"

[[keyboard.bindings]]
action = "Copy"
key = "Copy"

[[keyboard.bindings]]
action = "ClearLogNotice"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\f"
key = "L"
mode = "~Vi|~Search"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToTop"
key = "Home"
mode = "~Alt"
mods = "Shift"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "End"
mode = "~Alt"
mods = "Shift"

[shell]
program = "/bin/zsh"

[window]
dynamic_padding = true
dynamic_title = true
opacity = 0.9
title = ""

[window.dimensions]
columns = 74
lines = 22
